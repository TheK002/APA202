<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Property Card | Evergreen Terrace</title>
</head>
<body>
    <div class="card" id="propertyCard">
        <div class="image-container">
            <img class="house-image" id="houseImage" alt="House at 742 Evergreen Terrace" style="background: #d1d5db;">
            <div class="heart" id="heartBtn" role="button" aria-label="save to favorites">♡</div>
        </div>
        
        <div class="content">
            <div class="info-row">
                <span class="tag">🏡 DETACHED HOUSE</span>
                <span class="age">📅 5Y OLD</span>
            </div>
            
            <div class="price">
                <span>$</span>750,000
            </div>
            
            <div class="address">
                742 Evergreen Terrace
            </div>
            
            <div class="features">
                <div class="feature">
                    <span class="feature-icon">🛏️</span>
                    <span>3 Bedrooms</span>
                </div>
                <div class="feature">
                    <span class="feature-icon">🛁</span>
                    <span>2 Bathrooms</span>
                </div>
            </div>
            
            <div class="realtor-section">
                <div class="realtor-left">
                    <img class="profile-photo" id="realtorPhoto" alt="Tiffany Heffner profile">
                    <div class="realtor-details">
                        <div class="realtor-label">REALTOR</div>
                        <div class="realtor-name">Tiffany Heffner</div>
                    </div>
                </div>
                <div class="phone" id="phoneBtn">📞 (555) 555-4321</div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
