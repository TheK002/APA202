<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-card">
    <div class="card-header">
      <div class="form-title">Login Form</div>
      <button class="close-btn" aria-label="Close">
        <svg class="close-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <div class="input-group">
      <label for="loginIdentifier">Email or Phone</label>
      <input type="text" id="loginIdentifier" placeholder="your@email.com or +123456789">
    </div>

    <div class="input-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>

    <div class="forgot-row">
      <a href="#" class="forgot-link">Forgot Password?</a>
    </div>

    <button class="login-btn">LOGIN</button>

    <div class="signup-row">
      <span class="signup-text">Not a member?</span>
      <a href="#" class="signup-link">Signup now</a>
    </div>
  </div>
</body>
</html>
